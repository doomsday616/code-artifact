<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #ffe3f1 0%, #ffbcd9 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .heart-bg {
            position: absolute;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0.3) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }
        .shrek-tear {
            animation: tearFall 2s infinite ease-in;
        }
        @keyframes tearFall {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translateY(40px) scale(1);
                opacity: 0;
            }
        }
        .confetti {
            position: absolute;
            pointer-events: none;
            animation: confettiFall 4s linear infinite;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
            }
            100% {
                transform: translateY(105vh) rotate(720deg);
            }
        }
        .bounce-animation {
            animation: jump 0.6s infinite alternate ease-in-out;
        }
        @keyframes jump {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative select-none">

    <div id="hearts-container" class="absolute inset-0 z-0"></div>

    <div id="main-card" class="bg-white/90 backdrop-blur-sm p-8 rounded-[2rem] border-4 border-[#ff85b3] shadow-2xl max-w-sm w-[90%] text-center z-10 transition-all duration-500 transform scale-100">
        <div class="flex justify-center mb-6">
            <svg id="shrek-svg" width="180" height="180" viewBox="0 0 200 200" class="drop-shadow-lg">
                <path d="M 50,70 Q 30,50 35,35 Q 40,20 50,30 Q 55,35 52,48 Q 50,60 52,68" fill="#8cb83e" stroke="#5d8221" stroke-width="3" />
                <circle cx="35" cy="35" r="5" fill="#5d8221" />
                <path d="M 150,70 Q 170,50 165,35 Q 160,20 150,30 Q 145,35 148,48 Q 150,60 148,68" fill="#8cb83e" stroke="#5d8221" stroke-width="3" />
                <circle cx="165" cy="35" r="5" fill="#5d8221" />
                <ellipse cx="100" cy="110" rx="55" ry="60" fill="#8cb83e" stroke="#5d8221" stroke-width="4" />
                <ellipse cx="100" cy="155" rx="58" ry="20" fill="#7ba334" />
                <path d="M 60,140 Q 100,120 140,140" fill="none" stroke="#5d8221" stroke-width="4" />
                <path d="M 72,82 C 78,76 88,76 94,82" fill="none" stroke="#486619" stroke-width="3" stroke-linecap="round" />
                <path d="M 128,82 C 122,76 112,76 106,82" fill="none" stroke="#486619" stroke-width="3" stroke-linecap="round" />
                <ellipse cx="83" cy="90" rx="10" ry="8" fill="#ffffff" stroke="#5d8221" stroke-width="2" />
                <circle cx="83" cy="90" r="4" fill="#423115" />
                <circle cx="81" cy="88" r="1.5" fill="#ffffff" />
                <ellipse cx="117" cy="90" rx="10" ry="8" fill="#ffffff" stroke="#5d8221" stroke-width="2" />
                <circle cx="117" cy="90" r="4" fill="#423115" />
                <circle cx="115" cy="88" r="1.5" fill="#ffffff" />
                <path class="shrek-tear" d="M 83,94 Q 80,110 83,115" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
                <path class="shrek-tear" style="animation-delay: 1s;" d="M 117,94 Q 120,110 117,115" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
                <path d="M 92,98 C 92,98 95,92 100,92 C 105,92 108,98 108,98 C 108,98 103,108 100,108 C 97,108 92,98 92,98 Z" fill="#7ba334" stroke="#5d8221" stroke-width="2" />
                <path d="M 80,135 Q 100,145 120,135" fill="none" stroke="#4a1d1d" stroke-width="4" stroke-linecap="round" />
                <path d="M 75,137 C 75,137 77,130 81,133" fill="none" stroke="#4a1d1d" stroke-width="2" />
                <path d="M 125,137 C 125,137 123,130 119,133" fill="none" stroke="#4a1d1d" stroke-width="2" />
                <ellipse cx="70" cy="112" rx="8" ry="4" fill="#e11d48" opacity="0.15" />
                <ellipse cx="130" cy="112" rx="8" ry="4" fill="#e11d48" opacity="0.15" />
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-[#ff4d8d] mb-8 leading-snug">
            Will you go on a date with me? 🥺
        </h1>

        <div class="flex justify-center items-center gap-6 min-h-[60px] relative w-full">
            <button id="yesBtn" class="bg-[#ff5e97] hover:bg-[#ff3b7f] text-white font-bold px-8 py-3 rounded-full text-lg shadow-lg hover:shadow-xl transition-transform active:scale-95 z-20">
                Yes
            </button>
            <button id="noBtn" class="bg-[#9ca3af] hover:bg-[#868e96] text-white font-bold px-8 py-3 rounded-full text-lg shadow-lg transition-all duration-100 z-20">
                No
            </button>
        </div>
    </div>

    <script>
        const heartsContainer = document.getElementById('hearts-container');
        const colors = ['#ff85b3', '#ffb3d1', '#ff3b7f', '#ffccd5', '#fff0f3'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            
            const size = Math.random() * 20 + 10;
            heart.style.width = size + 'px';
            heart.style.height = size + 'px';
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            heart.innerHTML = `
                <svg viewBox="0 0 32 32" fill="${color}">
                    <path d="M16,28.261c-0.549,0-1.099-0.22-1.512-0.658L4.359,16.89C1.94,14.316,0.61,10.916,0.61,7.394 C0.61,3.468,3.774,0.3,7.694,0.3c2.476,0,4.8,1.285,6.177,3.376l2.129,3.226l2.129-3.226c1.377-2.091,3.701-3.376,6.177-3.376 c3.92,0,7.084,3.168,7.084,7.094c0,3.522-1.33,6.923-3.75,9.497L17.512,27.603C17.099,28.041,16.549,28.261,16,28.261z"/>
                </svg>
            `;
            
            heartsContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }

        setInterval(createHeart, 400);

        const noBtn = document.getElementById('noBtn');
        
        function moveNoButton() {
            if (noBtn.parentNode !== document.body) {
                document.body.appendChild(noBtn);
            }
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            
            const maxX = window.innerWidth - btnWidth - 40;
            const maxY = window.innerHeight - btnHeight - 40;
            
            let randomX = Math.random() * maxX + 20;
            let randomY = Math.random() * maxY + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            noBtn.style.zIndex = '9999';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('main-card');

        function triggerConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                
                const size = Math.random() * 8 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.backgroundColor = color;
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 6000);
            }
        }

        yesBtn.addEventListener('click', () => {
            if (noBtn && noBtn.parentNode) {
                noBtn.parentNode.removeChild(noBtn);
            }

            mainCard.innerHTML = `
                <div class="flex justify-center mb-6 bounce-animation">
                    <svg width="180" height="180" viewBox="0 0 200 200" class="drop-shadow-lg">
                        <path d="M 55,60 C 45,40 25,60 40,75 C 45,80 55,75 55,75 Z" fill="#a21caf" stroke="#701a75" stroke-width="2" />
                        <path d="M 145,60 C 155,40 175,60 160,75 C 155,80 145,75 145,75 Z" fill="#a21caf" stroke="#701a75" stroke-width="2" />
                        <path d="M 65,75 L 55,35 L 105,15 L 145,35 L 135,75 Z" fill="#a21caf" stroke="#701a75" stroke-width="3" />
                        <circle cx="100" cy="20" r="12" fill="#3b82f6" />
                        <text x="94" y="25" fill="#ffffff" font-size="14" font-weight="bold">T</text>
                        <ellipse cx="100" cy="110" rx="45" ry="48" fill="#ffedd5" stroke="#c2410c" stroke-width="3" />
                        <path d="M 75,60 C 65,65 50,85 55,100 C 60,115 70,110 70,110" fill="none" stroke="#c2410c" stroke-width="3" stroke-linecap="round" />
                        <path d="M 125,60 C 135,65 150,85 145,100 C 140,115 130,110 130,110" fill="none" stroke="#c2410c" stroke-width="3" stroke-linecap="round" />
                        <path d="M 50,55 Q 70,30 100,45 Q 130,30 150,55" fill="none" stroke="#78350f" stroke-width="8" stroke-linecap="round" />
                        <path d="M 70,50 L 55,65 L 50,85 L 65,75" fill="#78350f" />
                        <path d="M 130,50 L 145,65 L 150,85 L 135,75" fill="#78350f" />
                        <ellipse cx="82" cy="85" rx="12" ry="12" fill="#ffffff" stroke="#c2410c" stroke-width="2" />
                        <circle cx="82" cy="85" r="5" fill="#2563eb" />
                        <circle cx="84" cy="83" r="2" fill="#ffffff" />
                        <ellipse cx="118" cy="85" rx="12" ry="12" fill="#ffffff" stroke="#c2410c" stroke-width="2" />
                        <circle cx="118" cy="85" r="5" fill="#2563eb" />
                        <circle cx="120" cy="83" r="2" fill="#ffffff" />
                        <path d="M 75,72 Q 82,68 90,72" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" />
                        <path d="M 125,72 Q 118,68 110,72" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" />
                        <path d="M 78,105 Q 100,135 122,105" fill="#7f1d1d" stroke="#c2410c" stroke-width="2" fill-rule="evenodd" />
                        <rect x="92" y="104" width="16" height="8" rx="2" fill="#ffffff" />
                        <path d="M 98,110 Q 100,122 102,110" fill="#f43f5e" />
                        <path d="M 95,90 L 105,90 L 100,100 Z" fill="none" stroke="#c2410c" stroke-width="2" />
                    </svg>
                </div>

                <h1 class="text-3xl font-extrabold text-[#ff4d8d] mb-4 leading-snug">
                    You actually said yes? 🥲
                </h1>
                <p class="text-base text-[#ff66a3] font-medium mb-8">
                    I was so ready for you to say no
                </p>

                <div class="flex justify-center items-center min-h-[60px] w-full">
                    <button id="nextBtn" class="bg-[#ff5e97] hover:bg-[#ff3b7f] text-white font-bold px-10 py-3 rounded-full text-lg shadow-lg hover:shadow-xl transition-transform active:scale-95 z-20 flex items-center gap-2">
                        Next 💖
                    </button>
                </div>
            `;

            document.getElementById('nextBtn').addEventListener('click', () => {
                triggerConfetti();
                setInterval(createHeart, 100);
                
                mainCard.innerHTML = `
                    <div class="flex justify-center mb-6 bounce-animation">
                        <svg width="180" height="180" viewBox="0 0 200 200" class="drop-shadow-lg">
                            <ellipse cx="100" cy="115" rx="42" ry="50" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3" />
                            <ellipse cx="75" cy="150" rx="14" ry="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3" />
                            <ellipse cx="125" cy="150" rx="14" ry="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3" />
                            <ellipse cx="100" cy="80" rx="45" ry="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3" />
                            <path d="M 100,42 C 60,42 50,75 50,75 C 50,75 60,82 100,82 C 140,82 150,75 150,75 C 150,75 140,42 100,42 Z" fill="#f472b6" stroke="#db2777" stroke-width="3" />
                            <path d="M 50,75 C 50,75 65,70 100,70 C 135,70 150,75 150,75" fill="none" stroke="#db2777" stroke-width="2" />
                            <ellipse cx="100" cy="46" rx="12" ry="6" fill="#f472b6" stroke="#db2777" stroke-width="2" />
                            <path d="M 62,65 Q 55,50 63,45" fill="none" stroke="#cbd5e1" stroke-width="3" />
                            <path d="M 138,65 Q 145,50 137,45" fill="none" stroke="#cbd5e1" stroke-width="3" />
                            <path d="M 75,82 Q 85,78 90,83" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
                            <path d="M 125,82 Q 115,78 110,83" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" />
                            <ellipse cx="100" cy="90" rx="6" ry="4" fill="#f43f5e" />
                            <path d="M 94,95 Q 100,101 106,95" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" />
                            <path d="M 45,90 L 25,92 M 45,95 L 22,100 M 45,100 L 25,108" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />
                            <path d="M 155,90 L 175,92 M 155,95 L 178,100 M 155,100 L 175,108" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />
                            <ellipse cx="65" cy="92" rx="7" ry="4" fill="#f43f5e" opacity="0.3" />
                            <ellipse cx="135" cy="92" rx="7" ry="4" fill="#f43f5e" opacity="0.3" />
                        </svg>
                    </div>

                    <h1 class="text-3xl font-extrabold text-[#ff4d8d] mb-4 leading-snug">
                        I got you girl. 💕
                    </h1>
                    <p class="text-base text-[#ff66a3] font-medium mb-6">
                        Be ready, I'm coming to get you 🏎️
                    </p>

                    <div class="bg-pink-50/80 rounded-2xl p-4 border border-pink-200 text-left space-y-3 mb-4 shadow-inner">
                        <div class="flex items-center gap-3 text-pink-600 font-semibold">
                            <span class="text-xl">📅</span>
                            <span>June 13, 2026</span>
                        </div>
                        <div class="flex items-center gap-3 text-pink-600 font-semibold">
                            <span class="text-xl">⏰</span>
                            <span>11:30</span>
                        </div>
                        <div class="flex items-center gap-3 text-pink-600 font-semibold">
                            <span class="text-xl">📍</span>
                            <span>Shanghai</span>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
